# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: crypto_analytics
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - crypto_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crypto_network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      DB_CONNECTION: postgresql://user:password@postgres:5432/crypto_analytics
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - crypto_network
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
  redis_data:

networks:
  crypto_network:
    driver: bridge